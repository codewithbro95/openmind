name: Publish Python Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, such as v0.0.3."
        required: true
        type: string

permissions:
  contents: read

jobs:
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv

      - name: Check tag matches package version
        id: version
        run: |
          project_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )"

          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          expected_tag="v${project_version}"

          if [ "$tag" != "$expected_tag" ]; then
            echo "GitHub release tag $tag does not match pyproject.toml version $project_version."
            echo "This is probably a backfilled GitHub-only release, so PyPI publishing will be skipped."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.version.outputs.publish == 'true'
        run: uv build

      - name: Check package metadata
        if: steps.version.outputs.publish == 'true'
        run: uvx twine check dist/*

      - name: Publish package distributions to PyPI
        if: steps.version.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
